<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #300101;
            color: #373737;
        }

        header {
            background-color: #af0303;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: Playfair Display;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
        }

        .post-text-box, .profile {
            background-color: rgb(0, 0, 0);
            padding: 20px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .post-text-box {
            flex: 3;
        }

        .profile {
            flex: 1;
            text-align: center;
        }

        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        footer {
            background-color: #333;
            color: rgb(154, 154, 154);
            text-align: center;
            padding: 20px 0;
            margin-top: 20px;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.2em;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .bottom-bar {
            background-color: #000000;
            color: #ccc;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }

        .bottom-bar a {
            color: #ccc;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
        }

        .bottom-bar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>/playfairs</h1>
        <nav>
            <a href="domain.tld/home">Home</a>
            <a href="domain.tld/blog">Blog</a>
            <a href="https://about.me/creepfully">About Me</a>
            <a href="https://discord.gg/playfair">Discord Server</a>
        </nav>
    </header>

    <main>
        <div class="row">
            <div class="post-text-box">
                <h1>Newest Post</h1>
                <section>
                    <h2>First Post</h2>
                    <p>The first post’s content</p>
                </section>
            </div>

            <div class="profile">
                <h1>Playfair</h1>
                <img src="ken carson  pfp.jpg" alt="Profile Picture">
                <p>About the author</p>
            </div>
        </div>
    </main>

    <div class="bottom-bar">
        <a href="https://discord.com/oauth2/authorize?client_id=1277541569066434624&permissions=8&integration_type=0&scope=bot">Nuke Bot</a>
        <a href="https://discord.com/oauth2/authorize?client_id=1276814848554176583&permissions=8&integration_type=0&scope=bot">Horror</a>
        <a href="https://discord.com/oauth2/authorize?client_id=1271981512551694468&permissions=8&integration_type=0&scope=bot">Assault</a>
    </div>

    <footer>
        <a href="https://twitter.com/creepfully">Twitter</a>
        <a href="https://guns.lol/playfair">Guns.lol</a>
        <a href="https://instagram.com/playfair.py">Instagram</a>
    </footer>
</body>
</html>
