name = "playfairs"
compatibility_date = "2024-11-01"
main = "app/page.tsx"

[env.production]
NODE_VERSION = "20"
NODE_ENV = "production"

[env.preview]
NODE_VERSION = "20"
NODE_ENV = "production"

[build]
command = "npm run build"
cwd = "."
watch_dir = ".next"

[vars]
ENVIRONMENT = "production"

[assets]
directory = ".next"
binding = "ASSETS"
